name: fetch-meditation

on:
  schedule:
    # Every 5 min (GitHub's shortest interval) to minimise the polling wait
    # once Oura has synced a session. Scheduled runs can still be delayed by
    # GitHub under load; a webhook (repository_dispatch) is the near-realtime path.
    - cron: "*/5 * * * *"
  # Oura webhook -> Cloudflare Worker can fire this instantly when new session
  # data lands, removing the polling wait entirely.
  repository_dispatch:
    types: [oura_new_data]
  workflow_dispatch:
    inputs:
      mark_latest_new:
        description: "Test: re-mark the latest session as newly seen (meditation.js)"
        type: boolean
        default: false
      resend_latest:
        description: "Test: re-send the most recent session to Slack (notify.js)"
        type: boolean
        default: false

# Allow the job to commit the encrypted snapshots back to the repo.
permissions:
  contents: write

concurrency:
  group: fetch-meditation
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Oura meditation sessions (encrypted output)
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
          FITNESS_KEY: ${{ secrets.FITNESS_KEY }}
          MARK_LATEST_NEW: ${{ inputs.mark_latest_new && '1' || '' }}
        run: node meditation.js

      - name: Notify new sessions to Slack
        env:
          FITNESS_KEY: ${{ secrets.FITNESS_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_LATEST: ${{ inputs.resend_latest && '1' || '' }}
        run: node notify.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain meditation.json.enc notified.json.enc)" ]; then
            git pull --rebase --autostash
            git add meditation.json.enc notified.json.enc
            git commit -m "chore: update encrypted meditation + notified snapshots"
            git push
          else
            echo "No change in meditation.json.enc or notified.json.enc"
          fi
